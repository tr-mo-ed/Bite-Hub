{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>انتهت صلاحية الصفحة | Bite Hub</title>
  <link rel="icon" href="{% static 'brand/bitehub-app-icon.png' %}">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(45, 127, 249, .16), transparent 34%),
        radial-gradient(circle at bottom left, rgba(225, 31, 74, .12), transparent 36%),
        #f8fafc;
      color: #0f172a;
    }
    .card {
      width: min(92vw, 520px);
      padding: 30px;
      border-radius: 28px;
      background: rgba(255,255,255,.92);
      border: 1px solid #e2e8f0;
      box-shadow: 0 28px 70px rgba(15, 23, 42, .12);
      text-align: center;
    }
    img {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      object-fit: contain;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 900;
    }
    p {
      margin: 0 auto 22px;
      max-width: 410px;
      color: #64748b;
      line-height: 1.8;
      font-weight: 700;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #2d7ff9, #e11f4a);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="{% static 'brand/bitehub-app-icon.png' %}" alt="Bite Hub">
    <h1>انتهت صلاحية الصفحة</h1>
    <p>
      أعد تحميل الصفحة ثم كرر العملية. يحدث هذا غالباً بعد تسجيل الدخول في تبويب آخر أو الرجوع لصفحة قديمة.
    </p>
    <a href="{{ retry_url }}">العودة للوحة</a>
  </main>
</body>
</html>
