name: bitehub_app
description: "Bite Hub campus ordering app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- مكتبات أساسية للتصميم ---
  cupertino_icons: ^1.0.2
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.10+1

  # --- مكتبات الواجهات المتقدمة ---
  animated_bottom_navigation_bar: ^1.3.3
  awesome_notifications: ^0.11.0
  carousel_slider: ^5.1.1
  connectivity_plus: ^6.1.5
  ionicons: ^0.2.2
  lottie: ^3.3.1
  persistent_bottom_nav_bar_v2: ^6.3.2
  pinput: ^6.0.1
  shimmer: ^3.0.0
  web_socket_channel: ^3.0.3

  # --- مكتبة اختيار الصور (تمت إضافتها) ---
  image_picker: ^1.2.1

  # --- مكتبة إدارة الحالة (العقول) ---
  provider: ^6.1.5+1

  # --- مكتبات التواصل مع Firebase ---

  # --- أدوات أخرى ---
  sms_autofill: ^2.3.0
  http: ^1.6.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
